<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veru365™</title>
  <link rel="icon" href="assets/logo-icon.png" type="image/png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .logo {
      width: min(50vw, 50vh);
      max-width: 680px;
      min-width: 260px;
      object-fit: contain;
      display: block;
    }
    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.78rem;
      color: #9aa0b8;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <img src="assets/logo-combined.png" alt="Veru365™" class="logo" />
  <footer>© 2025 Veru365™. All rights reserved.</footer>
</body>
</html>
